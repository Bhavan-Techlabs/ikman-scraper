# Output mode: "excel" saves a local .xlsx file (uploaded as GitHub Actions artifact)
#              "sheets" writes to Google Sheets
#              "both" does both
output_mode: "excel"

# Google Spreadsheet ID (only used when output_mode is "sheets" or "both")
spreadsheet_id: "1r-G0X1x3BwZfnFDG_R2KwOdnbNrs8nkL4FK-60_MYVQ"

# Path to Google service account credentials JSON (only used for Sheets output)
credentials_path: "credentials.json"

# Reference list of all areas we want covered across all scrapers.
# This is for tracking only — not read by the scraper code.
# When adding a new area, add URLs for it in each supported website below.
areas:
  - Piliyandala   # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Ja-Ela        # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Kandy         # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Wattala       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Dehiwala      # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Colombo       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Talawatugoda  # ikman ✓  lankapropertyweb ✗  ceylonproperty ✓
  - Kottawa       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓

# URLs to scrape — supports ikman.lk, lankapropertyweb.com, and ceylonproperty.lk
urls:
  # ikman.lk
  - "https://ikman.lk/en/ads/piliyandala/houses-for-sale"
  - "https://ikman.lk/en/ads/ja-ela/houses-for-sale"
  - "https://ikman.lk/en/ads/kandy/houses-for-sale"
  - "https://ikman.lk/en/ads/wattala/houses-for-sale"
  - "https://ikman.lk/en/ads/dehiwala/houses-for-sale"
  - "https://ikman.lk/en/ads/colombo/houses-for-sale"
  - "https://ikman.lk/en/ads/talawatugoda/houses-for-sale"
  - "https://ikman.lk/en/ads/kottawa/houses-for-sale"
  # lankapropertyweb.com/
  - "https://www.lankapropertyweb.com/forsale-Central_Kandy-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Piliyandala-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Dehiwala-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Kottawa-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Ja+Ela-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Wattala-all.html"
  - "https://www.lankapropertyweb.com/forsale-Western_Colombo-all.html"
  # ceylonproperty.lk
  - "https://ceylonproperty.lk/sale?city=colombo"
  - "https://ceylonproperty.lk/sale?city=piliyandala"
  - "https://ceylonproperty.lk/sale?city=ja-ela"
  - "https://ceylonproperty.lk/sale?city=kandy"
  - "https://ceylonproperty.lk/sale?city=wattala"
  - "https://ceylonproperty.lk/sale?city=dehiwala"
  - "https://ceylonproperty.lk/sale?city=talawatugoda"
  - "https://ceylonproperty.lk/sale?city=kottawa"


# Global price filter (applied when the URL doesn't already have price params)
# Set to null to disable
price_filter:
  min: 5000000    # Rs 5 million
  max: 30000000   # Rs 30 million

# Duplicate detection: minimum description similarity ratio (0.0 - 1.0)
similarity_threshold: 0.9

# Delay between HTTP requests in seconds
request_delay: 1.5

# Only scrape ads posted within the last N days
max_age_days: 15

# Maximum pages to scrape per location (safety limit)
max_pages: 20
